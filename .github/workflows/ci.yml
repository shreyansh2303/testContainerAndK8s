name: Build and Push Docker Image

# This tells GitHub to run this job every time you push to the "main" branch
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # GitHub gives us a free Linux server to run this on

    steps:
      # Step 1: Download your code onto the GitHub server
      - name: Check out the code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub using the secrets you saved
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build the Docker image and push it to your account
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This tags the image as username/my-k8s-app:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/my-k8s-app:latest